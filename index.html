<!-- HOW TO ADD NEW PROJECTS                               -->
<!-- ===================================================== -->
<!--
When you finish a new project:

1. Create the project folder inside this repository.

Example:
html/basic-html/cat-photo-app/
css/flexbox/photo-gallery/

2. Inside that project folder place:
   - index.html
   - preview.png (screenshot of the project)

Example:
cat-photo-app/
    index.html
    preview.png

3. Copy the CARD TEMPLATE below.

4. Paste it inside the correct section (HTML / CSS / Certification).

5. Edit ONLY these fields:
   - href
   - image path
   - project title
   - description

Example link format:
html/basic-html/cat-photo-app/index.html

Do NOT change CSS classes.
Do NOT modify style.css.
-->
